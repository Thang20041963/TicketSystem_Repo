services:
  oracle-db:
    image: gvenzl/oracle-xe:latest
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=YourStrongPassword123
      - APP_USER=MYUSER # Tạo sẵn user cho app
      - APP_USER_PASSWORD=MYPASS
    volumes:
      - oracle_data:/opt/oracle/oradata

volumes:
  oracle_data:
